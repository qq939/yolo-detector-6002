<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOLO工业图像检测</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { text-align: center; padding: 30px 0; }
    header h1 {
      font-size: 2.5rem;
      background: linear-gradient(90deg, #00d4ff, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p { color: #888; margin-top: 10px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn {
      padding: 12px 25px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s;
    }
    .tab-btn.active { background: linear-gradient(90deg, #00d4ff, #7c3aed); }
    .tab-content { display: none; background: rgba(255,255,255,0.05); border-radius: 16px; padding: 30px; }
    .tab-content.active { display: block; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #aaa; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 1rem;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #00d4ff; }
    .btn {
      padding: 14px 30px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary { background: linear-gradient(90deg, #00d4ff, #7c3aed); color: #fff; }
    .btn-danger { background: #ff4757; color: #fff; }
    .btn-success { background: #2ed573; color: #fff; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,212,255,0.3); }
    .upload-area {
      border: 2px dashed rgba(255,255,255,0.3);
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover { border-color: #00d4ff; background: rgba(0,212,255,0.1); }
    .upload-area input { display: none; }
    .dataset-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .dataset-card {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .dataset-card.ok { border: 2px solid #2ed573; }
    .dataset-card.ng { border: 2px solid #ff4757; }
    .dataset-card .count { font-size: 2.5rem; font-weight: bold; }
    .dataset-card.ok .count { color: #2ed573; }
    .dataset-card.ng .count { color: #ff4757; }
    .progress-bar {
      width: 100%;
      height: 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      margin-top: 20px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff, #7c3aed);
      width: 0%;
      transition: width 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: #fff;
    }
    .result-section { margin-top: 30px; }
    .result-image, .result-video { max-width: 100%; border-radius: 12px; margin-top: 20px; }
    .video-player { width: 100%; border-radius: 12px; margin-top: 20px; }
    .status-text { text-align: center; margin-top: 10px; color: #aaa; }
    .loading { display: none; text-align: center; padding: 20px; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    .preview-item { background: rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; }
    .preview-item img, .preview-item video { width: 100%; height: 120px; object-fit: cover; }
    .preview-item .info { padding: 10px; font-size: 0.8rem; color: #aaa; }
    .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .alert-success { background: rgba(46, 213, 115, 0.2); border: 1px solid #2ed573; color: #2ed573; }
    .alert-error { background: rgba(255, 71, 87, 0.2); border: 1px solid #ff4757; color: #ff4757; }
    .row { display: flex; gap: 15px; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 200px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏭 YOLO工业图像检测</h1>
      <p>OK/NG分类训练 + 视频Demo生成</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('inference')">图片推理</button>
      <button class="tab-btn" onclick="switchTab('training')">模型训练</button>
      <button class="tab-btn" onclick="switchTab('demo')">视频Demo</button>
      <button class="tab-btn" onclick="switchTab('models')">模型管理</button>
    </div>

    <!-- 图片推理 -->
    <div id="inference" class="tab-content active">
      <h2>🔍 图片推理检测</h2>
      <div class="upload-area" onclick="document.getElementById('inferenceInput').click()">
        <input type="file" id="inferenceInput" accept="image/*" onchange="handleInferenceUpload(event)">
        <p>点击选择图片或拖拽到此处</p>
        <p style="font-size: 0.85rem; color: #888;">支持 JPG, PNG 格式</p>
      </div>
      <div id="inferencePreview" class="preview-grid"></div>
      <button class="btn btn-primary" onclick="runInference()" style="margin-top: 15px;">开始推理</button>
      
      <div id="inferenceLoading" class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">正在推理中...</p>
      </div>
      
      <div id="inferenceResult" class="result-section" style="display: none;">
        <h3>推理结果</h3>
        <div id="resultImageContainer"></div>
        <a id="downloadResult" class="btn btn-success" href="#" download>下载结果图片</a>
      </div>
    </div>

    <!-- 模型训练 -->
    <div id="training" class="tab-content">
      <h2>⚙️ OK/NG 模型训练</h2>
      
      <div class="dataset-cards">
        <div class="dataset-card ok">
          <h3>OK 图片</h3>
          <div class="count" id="okCount">0</div>
          <p>张</p>
          <div class="upload-area" onclick="document.getElementById('okInput').click()" style="margin-top: 15px; padding: 15px;">
            <input type="file" id="okInput" accept=".zip" onchange="uploadDataset('ok', event)">
            <p style="font-size: 0.85rem;">上传OK压缩包</p>
          </div>
        </div>
        <div class="dataset-card ng">
          <h3>NG 图片</h3>
          <div class="count" id="ngCount">0</div>
          <p>张</p>
          <div class="upload-area" onclick="document.getElementById('ngInput').click()" style="margin-top: 15px; padding: 15px;">
            <input type="file" id="ngInput" accept=".zip" onchange="uploadDataset('ng', event)">
            <p style="font-size: 0.85rem;">上传NG压缩包</p>
          </div>
        </div>
      </div>

      <div id="datasetStatus"></div>

      <div class="row">
        <div class="form-group">
          <label>模型类型</label>
          <select id="modelType">
            <option value="yolov8n">YOLOv8n (nano - 最快)</option>
            <option value="yolov8s">YOLOv8s (small)</option>
            <option value="yolov8m">YOLOv8m (medium)</option>
            <option value="yolov8l">YOLOv8l (large)</option>
          </select>
        </div>
        <div class="form-group">
          <label>训练轮数 (epochs)</label>
          <input type="number" id="epochs" value="50" min="1" max="500">
        </div>
        <div class="form-group">
          <label>批量大小</label>
          <input type="number" id="batchSize" value="8" min="1" max="64">
        </div>
      </div>

      <button class="btn btn-primary" onclick="startTraining()">开始训练</button>
      <button class="btn btn-danger" onclick="stopTraining()" style="margin-left: 10px;">停止</button>

      <div id="trainLoading" class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">训练进行中...</p>
      </div>

      <div id="trainProgress" style="display: none;">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill">0%</div>
        </div>
        <p class="status-text" id="statusText">准备中...</p>
      </div>
    </div>

    <!-- 视频Demo -->
    <div id="demo" class="tab-content">
      <h2>🎬 视频Demo生成</h2>
      
      <div class="form-group">
        <label>上传视频</label>
        <div class="upload-area" onclick="document.getElementById('videoInput').click()">
          <input type="file" id="videoInput" accept="video/*" onchange="handleVideoUpload(event)">
          <p>点击选择视频文件</p>
          <p style="font-size: 0.85rem; color: #888;">支持 MP4, AVI, MOV 格式</p>
        </div>
        <div id="videoPreview" style="margin-top: 15px;"></div>
      </div>

      <div class="form-group">
        <label>选择模型</label>
        <select id="demoModel">
          <option value="">自动选择最新模型</option>
        </select>
      </div>

      <button class="btn btn-primary" onclick="generateDemo()">生成Demo</button>

      <div id="demoLoading" class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">正在处理视频...</p>
      </div>

      <div id="demoProgress" style="display: none;">
        <div class="progress-bar">
          <div class="progress-fill" id="demoProgressFill">0%</div>
        </div>
        <p class="status-text" id="demoStatusText">处理中...</p>
      </div>

      <div id="demoResult" class="result-section" style="display: none;">
        <h3>Demo生成完成!</h3>
        <video id="resultVideo" class="video-player" controls></video>
        <br>
        <a id="downloadDemo" class="btn btn-success" href="#" download>下载Demo视频</a>
      </div>
    </div>

    <!-- 模型管理 -->
    <div id="models" class="tab-content">
      <h2>📦 模型管理</h2>
      <div id="modelList" class="preview-grid"></div>
    </div>
  </div>

  <script>
    let inferenceFiles = [];
    let selectedVideo = null;
    let currentJobId = null;
    let trainJobId = null;

    // 切换标签页
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      event.target.classList.add('active');
      
      if (tabId === 'models') loadModels();
      if (tabId === 'demo') loadDemoModels();
    }

    // 页面加载时获取数据集状态
    loadDatasetStatus();

    async function loadDatasetStatus() {
      try {
        const response = await fetch('/api/train/dataset');
        const data = await response.json();
        document.getElementById('okCount').textContent = data.ok || 0;
        document.getElementById('ngCount').textContent = data.ng || 0;
        
        if (data.ok > 0 && data.ng > 0) {
          document.getElementById('datasetStatus').innerHTML = '<div class="alert alert-success">数据集已就绪，可以开始训练</div>';
        } else {
          document.getElementById('datasetStatus').innerHTML = '<div class="alert alert-error">请同时上传OK和NG图片压缩包</div>';
        }
      } catch (e) {}
    }

    // 上传数据集
    async function uploadDataset(type, event) {
      const file = event.target.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append('file', file);

      const response = await fetch(`/api/train/dataset/${type}`, {
        method: 'POST',
        body: formData
      });

      const result = await response.json();
      alert(result.message);
      loadDatasetStatus();
    }

    // 处理推理图片上传
    function handleInferenceUpload(event) {
      inferenceFiles = Array.from(event.target.files);
      const preview = document.getElementById('inferencePreview');
      preview.innerHTML = '';
      
      inferenceFiles.forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
          preview.innerHTML += `<div class="preview-item"><img src="${e.target.result}"><div class="info">${file.name}</div></div>`;
        };
        reader.readAsDataURL(file);
      });
    }

    // 运行推理
    async function runInference() {
      if (inferenceFiles.length === 0) {
        alert('请先选择图片');
        return;
      }

      document.getElementById('inferenceLoading').style.display = 'block';
      document.getElementById('inferenceResult').style.display = 'none';

      const file = inferenceFiles[0];
      const formData = new FormData();
      formData.append('image', file);

      try {
        const response = await fetch('/api/predict', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();
        document.getElementById('inferenceLoading').style.display = 'none';

        if (result.success && result.resultImage) {
          document.getElementById('inferenceResult').style.display = 'block';
          document.getElementById('resultImageContainer').innerHTML = `<img src="${result.resultImage}" class="result-image">`;
          document.getElementById('downloadResult').href = result.resultImage;
        } else {
          alert('推理完成，但未检测到目标');
        }
      } catch (error) {
        alert('推理失败: ' + error.message);
      }
    }

    // 开始训练
    async function startTraining() {
      const okCount = parseInt(document.getElementById('okCount').textContent);
      const ngCount = parseInt(document.getElementById('ngCount').textContent);

      if (okCount === 0 || ngCount === 0) {
        alert('请先上传OK和NG数据集');
        return;
      }

      const formData = new FormData();
      formData.append('modelType', document.getElementById('modelType').value);
      formData.append('epochs', document.getElementById('epochs').value);
      formData.append('batchSize', document.getElementById('batchSize').value);

      document.getElementById('trainLoading').style.display = 'block';
      document.getElementById('trainProgress').style.display = 'block';

      try {
        const response = await fetch('/api/train/start', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();
        
        if (result.success) {
          trainJobId = result.jobId;
          pollTrainStatus();
        } else {
          alert(result.message);
          document.getElementById('trainLoading').style.display = 'none';
        }
      } catch (error) {
        alert('训练失败: ' + error.message);
        document.getElementById('trainLoading').style.display = 'none';
      }
    }

    // 轮询训练状态
    async function pollTrainStatus() {
      if (!trainJobId) return;

      try {
        const response = await fetch(`/api/train/status/${trainJobId}`);
        const status = await response.json();

        document.getElementById('progressFill').style.width = status.progress + '%';
        document.getElementById('progressFill').textContent = status.progress + '%';
        document.getElementById('statusText').textContent = status.message;

        if (status.status === 'completed') {
          document.getElementById('trainLoading').style.display = 'none';
          alert('训练完成!');
          loadModels();
        } else if (status.status === 'error') {
          document.getElementById('trainLoading').style.display = 'none';
          alert('训练失败');
        } else {
          setTimeout(pollTrainStatus, 2000);
        }
      } catch (e) {
        setTimeout(pollTrainStatus, 2000);
      }
    }

    // 停止训练
    async function stopTraining() {
      trainJobId = null;
      document.getElementById('trainLoading').style.display = 'none';
      alert('训练已停止');
    }

    // 处理视频上传
    function handleVideoUpload(event) {
      selectedVideo = event.target.files[0];
      if (selectedVideo) {
        const url = URL.createObjectURL(selectedVideo);
        document.getElementById('videoPreview').innerHTML = `
          <video src="${url}" style="width: 300px; border-radius: 8px;" controls></video>
          <p style="margin-top: 10px;">${selectedVideo.name}</p>
        `;
      }
    }

    // 加载模型列表（Demo用）
    async function loadDemoModels() {
      const response = await fetch('/api/models');
      const result = await response.json();
      
      const select = document.getElementById('demoModel');
      select.innerHTML = '<option value="">自动选择最新模型</option>';
      
      result.models.forEach(m => {
        select.innerHTML += `<option value="${m.name}">${m.name}</option>`;
      });
    }

    // 生成Demo
    async function generateDemo() {
      if (!selectedVideo) {
        alert('请先选择视频');
        return;
      }

      const formData = new FormData();
      formData.append('video', selectedVideo);

      document.getElementById('demoLoading').style.display = 'block';
      document.getElementById('demoProgress').style.display = 'block';
      document.getElementById('demoResult').style.display = 'none';

      try {
        const response = await fetch('/api/demo/video', {
          method: 'POST',
          body: formData
        });

        const result = await response.json();
        
        if (result.success) {
          currentJobId = result.jobId;
          pollDemoStatus(result.output);
        } else {
          alert(result.message);
          document.getElementById('demoLoading').style.display = 'none';
        }
      } catch (error) {
        alert('生成失败: ' + error.message);
        document.getElementById('demoLoading').style.display = 'none';
      }
    }

    // 轮询Demo状态
    async function pollDemoStatus(outputUrl) {
      if (!currentJobId) return;

      try {
        const response = await fetch(`/api/demo/status/${currentJobId}`);
        const status = await response.json();

        document.getElementById('demoProgressFill').style.width = status.progress + '%';
        document.getElementById('demoProgressFill').textContent = status.progress + '%';
        document.getElementById('demoStatusText').textContent = status.message;

        if (status.status === 'completed') {
          document.getElementById('demoLoading').style.display = 'none';
          document.getElementById('demoResult').style.display = 'block';
          document.getElementById('resultVideo').src = outputUrl;
          document.getElementById('downloadDemo').href = outputUrl;
        } else if (status.status === 'error') {
          document.getElementById('demoLoading').style.display = 'none';
          alert('生成失败');
        } else {
          setTimeout(() => pollDemoStatus(outputUrl), 2000);
        }
      } catch (e) {
        setTimeout(() => pollDemoStatus(outputUrl), 2000);
      }
    }

    // 加载模型列表
    async function loadModels() {
      const response = await fetch('/api/models');
      const result = await response.json();
      
      const list = document.getElementById('modelList');
      if (result.models.length === 0) {
        list.innerHTML = '<p style="color: #888;">暂无训练好的模型</p>';
        return;
      }
      
      list.innerHTML = result.models.map(m => `
        <div class="preview-item">
          <div class="info">
            <strong>${m.name}</strong><br>
            ${(m.size / 1024 / 1024).toFixed(2)} MB<br>
            <small>${new Date(m.mtime).toLocaleString()}</small>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
